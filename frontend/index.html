<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Yield Curve Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          navy: { 950: '#07111f', 900: '#0d1b2e', 800: '#112240', 700: '#1a3358', 600: '#1e3a5f' }
        }
      }
    }
  }
</script>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
  /* Theme toggle */
  #toggle-thumb { transition: transform 0.25s ease; }
  html.dark #toggle-thumb { transform: translateX(1.5rem); }
  html.dark #toggle-track { background-color: #3b82f6; }

  /* Bloomberg data toggle */
  #bb-thumb { transition: transform 0.25s ease; }
  .bb-on #bb-thumb { transform: translateX(1.25rem); }
  .bb-on #bb-track { background-color: #3b82f6; }

  /* Shared pill style (tenor + country) */
  .pill-cb input[type=checkbox], .pill-cb input[type=radio] { display: none; }
  .pill-cb span {
    display: inline-block; padding: 4px 10px; border-radius: 9999px; font-size: 0.75rem;
    font-weight: 600; cursor: pointer; border: 1.5px solid #d1d5db;
    color: #6b7280; background: white; transition: all 0.15s;
    user-select: none;
  }
  .pill-cb input:checked + span { background: #2563eb; color: white; border-color: #2563eb; }
  html.dark .pill-cb span { border-color: #1e3a5f; color: #94a3b8; background: #0d1b2e; }
  html.dark .pill-cb input:checked + span { background: #3b82f6; color: white; border-color: #3b82f6; }

  /* Date picker dark mode */
  html.dark input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }

  /* Table striping */
  #yield-table tbody tr:nth-child(even) { background-color: #f9fafb; }
  html.dark #yield-table tbody tr:nth-child(even) { background-color: #0a1628; }
  #yield-table tbody tr:hover { background-color: #eff6ff; }
  html.dark #yield-table tbody tr:hover { background-color: #1a3358; }
</style>
</head>
<body class="bg-gray-100 dark:bg-navy-900 text-gray-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

<div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white">Global Yield Curve Dashboard</h1>
      <p class="text-sm text-gray-500 dark:text-slate-400 mt-0.5">Sovereign bond yields across maturities</p>
    </div>
    <div class="flex items-center gap-2.5">
      <span class="text-xs font-medium text-gray-400 dark:text-slate-500">Light</span>
      <button id="toggle-theme" aria-label="Toggle theme" class="relative w-12 h-6 focus:outline-none">
        <div id="toggle-track" class="w-12 h-6 rounded-full bg-gray-300 transition-colors duration-300"></div>
        <div id="toggle-thumb" class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow-md"></div>
      </button>
      <span class="text-xs font-medium text-gray-400 dark:text-slate-500">Dark</span>
    </div>
  </div>

  <!-- Controls card -->
  <div class="bg-white dark:bg-navy-800 rounded-2xl shadow-sm border border-gray-200 dark:border-navy-600 p-5 mb-5">
    <div class="flex flex-wrap gap-5 items-end">

      <!-- Mode -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Mode</label>
        <select id="mode" class="px-3 py-2 rounded-lg border border-gray-200 dark:border-navy-600 bg-gray-50 dark:bg-navy-900 text-gray-900 dark:text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
          <option value="country">Country</option>
          <option value="tenor">Tenor</option>
          <option value="spread">Spread</option>
          <option value="cod">Live CoD</option>
          <option value="country-overlay-hist">Country Overlay (Hist)</option>
          <option value="tenor-overlay-hist">Tenor Overlay (Hist)</option>
        </select>
      </div>

      <!-- Country multi-select overlay -->
      <div class="flex flex-col gap-1.5 relative" id="country-wrapper">
        <label class="text-xs font-semibold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Countries</label>
        <button id="country-btn" type="button"
          class="flex items-center gap-2 px-3 py-2 rounded-lg border border-gray-200 dark:border-navy-600 bg-gray-50 dark:bg-navy-900 text-gray-900 dark:text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 min-w-[130px] justify-between">
          <span id="country-btn-label">US</span>
          <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <!-- Dropdown overlay -->
        <div id="country-dropdown"
          class="absolute top-full left-0 mt-1.5 z-50 hidden bg-white dark:bg-navy-800 border border-gray-200 dark:border-navy-600 rounded-xl shadow-xl p-3 min-w-[160px]">
          <div id="country-single" class="flex flex-col gap-2">
            <label class="pill-cb"><input type="radio" name="country" value="united_states"><span class="w-full">🇺🇸 US</span></label>
            <label class="pill-cb"><input type="radio" name="country" value="united_kingdom"><span class="w-full">🇬🇧 UK</span></label>
            <label class="pill-cb"><input type="radio" name="country" value="germany"><span class="w-full">🇩🇪 GER</span></label>
            <label class="pill-cb"><input type="radio" name="country" value="france"><span class="w-full">🇫🇷 FRA</span></label>
          </div>
          <div id="country-multi" class="flex flex-col gap-2 hidden">
            <label class="pill-cb"><input type="checkbox" name="country-multi" value="united_states"><span class="w-full">🇺🇸 US</span></label>
            <label class="pill-cb"><input type="checkbox" name="country-multi" value="united_kingdom"><span class="w-full">🇬🇧 UK</span></label>
            <label class="pill-cb"><input type="checkbox" name="country-multi" value="germany"><span class="w-full">🇩🇪 GER</span></label>
            <label class="pill-cb"><input type="checkbox" name="country-multi" value="france"><span class="w-full">🇫🇷 FRA</span></label>
          </div>
        </div>
      </div>

      <!-- From -->
      <div id="ctrl-from" class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-gray-400 dark:text-slate-500 uppercase tracking-wider">From</label>
        <input type="date" id="start_date" class="px-3 py-2 rounded-lg border border-gray-200 dark:border-navy-600 bg-gray-50 dark:bg-navy-900 text-gray-900 dark:text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- To -->
      <div id="ctrl-to" class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-gray-400 dark:text-slate-500 uppercase tracking-wider">To</label>
        <input type="date" id="end_date" class="px-3 py-2 rounded-lg border border-gray-200 dark:border-navy-600 bg-gray-50 dark:bg-navy-900 text-gray-900 dark:text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Tenors -->
      <div id="ctrl-tenors" class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Tenors</label>
        <div id="tenor-checkboxes" class="flex flex-wrap gap-1.5">
          <label class="pill-cb"><input type="checkbox" value="1M"><span>1M</span></label>
          <label class="pill-cb"><input type="checkbox" value="3M"><span>3M</span></label>
          <label class="pill-cb"><input type="checkbox" value="6M"><span>6M</span></label>
          <label class="pill-cb"><input type="checkbox" value="1Y"><span>1Y</span></label>
          <label class="pill-cb"><input type="checkbox" value="2Y"><span>2Y</span></label>
          <label class="pill-cb"><input type="checkbox" value="5Y"><span>5Y</span></label>
          <label class="pill-cb"><input type="checkbox" value="10Y"><span>10Y</span></label>
          <label class="pill-cb"><input type="checkbox" value="30Y"><span>30Y</span></label>
        </div>
      </div>

    </div>
  </div>

  <!-- Error -->
  <div id="error-msg" class="hidden mb-4 px-4 py-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 text-sm"></div>

  <!-- Chart -->
<div class="bg-white dark:bg-navy-800 rounded-2xl shadow-sm border border-gray-200 dark:border-navy-600 p-4 mb-5">

<div class="flex items-center justify-between mb-2">

<div class="text-sm text-gray-500 dark:text-slate-400">
<span id="chart-card-label">Yield Curve</span>
</div>

<div class="flex items-center gap-2 text-xs">

<span class="text-gray-400 dark:text-slate-500">FinanceFlowAPI</span>

<button id="bloomberg-toggle" class="relative w-10 h-5 focus:outline-none bb-on">
<div id="bb-track" class="w-10 h-5 rounded-full bg-gray-300"></div>
<div id="bb-thumb" class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow"></div>
</button>

<span class="text-gray-400 dark:text-slate-500">Bloomberg</span>

</div>

</div>

<div id="chart" style="height:460px;"></div>
<div id="cod-container" class="hidden py-2 overflow-x-auto"></div>

</div>

  <!-- Table -->
  <p id="table-note" class="hidden text-xs text-gray-400 dark:text-slate-500 mb-1 text-right"></p>
  <div id="yield-table-container" class="bg-white dark:bg-navy-800 rounded-2xl shadow-sm border border-gray-200 dark:border-navy-600 overflow-hidden">
    <table id="yield-table" class="w-full text-sm">
      <thead>
        <tr class="bg-gray-50 dark:bg-navy-900 border-b border-gray-200 dark:border-navy-600">
          <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider">Date</th>
          <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider">Country</th>
          <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider">Tenor</th>
          <th class="px-5 py-3 text-right text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider">Yield (%)</th>
          <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider">Source</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100 dark:divide-navy-700"></tbody>
    </table>
  </div>

</div>

<script>
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:8000'
    : '';
const COUNTRY_LABELS = {united_states:'US', united_kingdom:'UK', france:'FRA', germany:'GER'};
function countryLabel(c){ return COUNTRY_LABELS[c] || c; }

const TENOR_ORDER = {
  "1M": 1,
  "3M": 2,
  "6M": 3,
  "1Y": 4,
  "2Y": 5,
  "5Y": 6,
  "10Y": 7,
  "30Y": 8
};
function getSpreadTenors() {

    const selected = getSelectedTenors()

    if(selected.length !== 2) return null

    const ordered = [...selected].sort(
        (a,b) => TENOR_ORDER[a] - TENOR_ORDER[b]
    )

    return {
        small: ordered[0],
        large: ordered[1]
    }

}

const modeSelect       = document.getElementById('mode');
const startDateInput   = document.getElementById('start_date');
const endDateInput     = document.getElementById('end_date');
const tenorCheckboxes  = document.querySelectorAll('#tenor-checkboxes input[type=checkbox]');
const countryCheckboxes = document.querySelectorAll('#country-dropdown input[name=country]');

const chartDiv         = document.getElementById('chart');
const tableBody        = document.querySelector('#yield-table tbody');

let forceBloomberg = true;
let autoRefreshInterval = null;

let lastChart = null; // { data, mode, selectedCountries }
const responseCache = new Map(); // url → { data, ts }
const CACHE_TTL_TODAY_MS      = 5  * 60 * 1000; // 5 min  — URL includes today's date
const CACHE_TTL_HISTORICAL_MS = 60 * 60 * 1000; // 60 min — purely historical URL

function getSelectedTenors()    { return Array.from(tenorCheckboxes).filter(cb => cb.checked).map(cb => cb.value); }
function isOverlayMode() {
    return modeSelect.value === 'country-overlay-hist' || modeSelect.value === 'tenor-overlay-hist';
}
function baseMode(mode) {
    if (mode === 'country-overlay-hist') return 'country';
    if (mode === 'tenor-overlay-hist') return 'tenor';
    return mode;
}
function getSelectedCountries() {
    if (isOverlayMode()) {
        return Array.from(document.querySelectorAll('#country-multi input:checked')).map(cb => cb.value);
    }
    const checked = document.querySelector('#country-dropdown input[name=country]:checked');
    return checked ? [checked.value] : [];
}
function todayStr()     { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function yesterdayStr() { const d = new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isDark()    { return document.documentElement.classList.contains('dark'); }

// ── Country overlay ──────────────────────────────────────────────
const countryBtn      = document.getElementById('country-btn');
const countryDropdown = document.getElementById('country-dropdown');
const countryBtnLabel = document.getElementById('country-btn-label');

const bbToggle = document.getElementById("bloomberg-toggle");

bbToggle.addEventListener("click", () => {
  forceBloomberg = !forceBloomberg;
  bbToggle.classList.toggle("bb-on");
  responseCache.clear();
  if (!forceBloomberg) {
    autoRefreshInterval = setInterval(() => { responseCache.clear(); fetchData(); }, 5 * 60 * 1000);
  } else {
    clearInterval(autoRefreshInterval);
    autoRefreshInterval = null;
  }
  fetchData();
});

countryBtn.addEventListener('click', e => {
    e.stopPropagation();
    countryDropdown.classList.toggle('hidden');
});
document.addEventListener('click', e => {
    if(!e.target.closest('#country-wrapper')) countryDropdown.classList.add('hidden');
});

function updateCountryBtnLabel() {
    const sel = getSelectedCountries();
    countryBtnLabel.textContent = sel.length === 0 ? 'None'
        : sel.map(countryLabel).join(', ');
}

countryCheckboxes.forEach(cb => {
    cb.addEventListener('change', () => { updateCountryBtnLabel(); fetchData(); });
});

const countryMultiCheckboxes = document.querySelectorAll('#country-multi input[name=country-multi]');
countryMultiCheckboxes.forEach(cb => {
    cb.addEventListener('change', () => { updateCountryBtnLabel(); fetchData(); });
});

// Default: US selected
document.querySelector('#country-dropdown input[value="united_states"]').checked = true;
updateCountryBtnLabel();

// ── Defaults ─────────────────────────────────────────────────────
startDateInput.value = todayStr();
endDateInput.value   = todayStr();

function setTenorDefaults() {
    const mode = modeSelect.value;

    if(mode === 'country' || mode === 'country-overlay-hist'){
        tenorCheckboxes.forEach(cb => cb.checked = true);
    }

    else if(mode === 'tenor' || mode === 'tenor-overlay-hist'){
        tenorCheckboxes.forEach(cb => cb.checked = (cb.value === '10Y'));
    }

    else if(mode === 'spread'){
        tenorCheckboxes.forEach(cb =>
            cb.checked = (cb.value === '2Y' || cb.value === '10Y')
        );
    }

    else if(mode === 'cod'){
        tenorCheckboxes.forEach(cb =>
            cb.checked = (cb.value === '2Y' || cb.value === '5Y' || cb.value === '10Y' || cb.value === '30Y')
        );
    }

}

setTenorDefaults();
updateControlsVisibility();
modeSelect.addEventListener('change', () => { setTenorDefaults(); updateControlsVisibility(); fetchData(); });

// ── Fetch ─────────────────────────────────────────────────────────
async function fetchData() {
    const mode     = modeSelect.value;
    const bMode    = baseMode(mode);
    const overlay  = isOverlayMode();
    const yest     = yesterdayStr();
    // For overlay modes cap start/end to yesterday; today is not permitted
    const start    = overlay && startDateInput.value > yest ? yest : startDateInput.value;
    const end      = overlay && (endDateInput.value > yest || !endDateInput.value) ? yest : endDateInput.value;
    const selected = getSelectedCountries();

    if(bMode === 'cod') { await fetchCoDData(); return; }

    if(!selected.length) {
        clearError();
        Plotly.purge(chartDiv);
        tableBody.innerHTML = '';
        return;
    }

    try {
        const sc = selected.join(',');
        let url = `${API_BASE}/yield-curve/all?selected_countries=${sc}&force_scrape=${forceBloomberg}`;
        if(bMode === 'country'){
            const defaultDate = overlay ? yest : todayStr();
            url += `&start=${start||defaultDate}&end=${end||defaultDate}&view=country`;
        } else {
            const s = start || (() => { const d = new Date(Date.now()-7*24*60*60*1000); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
            const defaultEnd = overlay ? yest : todayStr();
            url += `&start=${s}&end=${end||defaultEnd}`;
        }

        const cached = responseCache.get(url);
        const ttl = url.includes(todayStr()) ? CACHE_TTL_TODAY_MS : CACHE_TTL_HISTORICAL_MS;
        const cacheValid = cached !== undefined && (Date.now() - cached.ts) < ttl;
        const raw = cacheValid
            ? cached.data
            : await fetch(url).then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });
        if (!cacheValid) responseCache.set(url, { data: raw, ts: Date.now() });
        console.log("API response:", raw);
        if(raw.error) { showError(raw.error); return; }

        // Normalise API responses
        let data = raw;

        if (!Array.isArray(raw)) {

          if (raw.data) {
              data = [raw];   // already in {country,data} format
          } else {
              data = [{
                  country: selected[0],
                  data: raw
              }];
          }
}

        clearError();
        lastChart = { data, mode: bMode, selectedCountries: selected };
        updateChart(data, bMode, selected);
        updateTable(data, bMode);
    } catch(err) {
        showError(`Failed to fetch: ${err.message}. Is the server running? (uvicorn main:app)`);
    }
}

// ── Controls visibility ───────────────────────────────────────────
function updateControlsVisibility() {
    const mode = modeSelect.value;
    const isCod = mode === 'cod';
    const overlay = mode === 'country-overlay-hist' || mode === 'tenor-overlay-hist';
    document.getElementById('ctrl-from').classList.toggle('hidden', isCod);
    document.getElementById('ctrl-to').classList.toggle('hidden', isCod);
    document.getElementById('chart').style.display = isCod ? 'none' : '';
    document.getElementById('cod-container').classList.toggle('hidden', !isCod);
    document.getElementById('yield-table-container').classList.toggle('hidden', isCod);
    document.getElementById('table-note').classList.toggle('hidden', true);
    document.getElementById('chart-card-label').textContent = isCod ? 'Live Change on Day' : 'Yield Curve';

    // Toggle between single-select (radio) and multi-select (checkbox) country picker
    document.getElementById('country-single').classList.toggle('hidden', overlay);
    document.getElementById('country-multi').classList.toggle('hidden', !overlay);
    // Default: select all countries when entering an overlay mode
    if (overlay) {
        countryMultiCheckboxes.forEach(cb => cb.checked = true);
    }
    updateCountryBtnLabel();

    // Date constraints for historical overlay modes — today is not allowed
    const yest = yesterdayStr();
    if (overlay) {
        startDateInput.max = yest;
        endDateInput.max = yest;
        if (!endDateInput.value || endDateInput.value > yest) {
            endDateInput.value = yest;
        }
        if (!startDateInput.value || startDateInput.value > yest) {
            if (mode === 'country-overlay-hist') {
                startDateInput.value = yest;
            } else {
                const d = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
                startDateInput.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }
        }
    } else {
        startDateInput.removeAttribute('max');
        endDateInput.removeAttribute('max');
    }
}

// ── Live CoD fetch & render ───────────────────────────────────────
async function fetchCoDData() {
    const selected = getSelectedCountries();
    if(!selected.length) {
        clearError();
        document.getElementById('cod-container').innerHTML = '';
        return;
    }
    try {
        const sc = selected.join(',');
        const url = `${API_BASE}/yield-curve-cod/all?selected_countries=${sc}&force_scrape=${forceBloomberg}`;
        const cached = responseCache.get(url);
        const cacheValid = cached !== undefined && (Date.now() - cached.ts) < CACHE_TTL_TODAY_MS;
        const raw = cacheValid
            ? cached.data
            : await fetch(url).then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });
        if(!cacheValid) responseCache.set(url, { data: raw, ts: Date.now() });
        if(raw.error) { showError(raw.error); return; }
        clearError();
        const dataArray = Array.isArray(raw) ? raw : [raw];
        updateCoDTable(dataArray[0]);
    } catch(err) {
        showError(`Failed to fetch CoD data: ${err.message}. Is the server running? (uvicorn main:app)`);
    }
}

function shortSource(s) {
    if(!s) return '—';
    if(s === 'Bloomberg Rates')            return 'Bloomberg';
    if(s.startsWith('Bloomberg (Last'))    return 'BBG (stale)';
    if(s === 'FinanceFlowAPI')             return 'FinanceFlow';
    if(s === 'FRED API')                   return 'FRED';
    if(s === 'BBG Cache')                  return 'BBG Cache';
    if(s === 'FinanceFlow Cache')          return 'FF Cache';
    return s;
}

function updateCoDTable(codData) {
    const ALL_TENORS = ["1M","3M","6M","1Y","2Y","5Y","10Y","30Y"];
    const selected = getSelectedTenors();
    const TENORS_LIST = selected.length ? ALL_TENORS.filter(t => selected.includes(t)) : ALL_TENORS;
    const today     = codData.today_date;
    const prevDate  = codData.prev_date || '—';
    const tenorData = codData.tenors;

    const thCls      = 'px-4 py-3 text-center text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider';
    const tdCls      = 'px-4 py-3 text-center font-mono text-sm text-gray-900 dark:text-slate-100';
    const tdLabelCls = 'px-4 py-3 text-left text-sm font-semibold text-gray-700 dark:text-slate-300 whitespace-nowrap';
    const na         = `<span class="text-gray-400 dark:text-slate-500">NA</span>`;

    const tenorCells = TENORS_LIST.map(t =>
        `<td class="${thCls}">${t}</td>`
    ).join('');

    const codCells = TENORS_LIST.map(t => {
        const v = tenorData[t]?.cod_bps;
        if(v === null || v === undefined) return `<td class="${tdCls}">${na}</td>`;
        const colorCls = v > 0
            ? 'text-red-500 dark:text-red-400'
            : v < 0
                ? 'text-green-500 dark:text-green-400'
                : 'text-gray-500 dark:text-slate-400';
        const sign = v > 0 ? '+' : '';
        return `<td class="px-4 py-3 text-center font-mono text-sm font-bold ${colorCls}">${sign}${v.toFixed(2)}</td>`;
    }).join('');

    const todayCells = TENORS_LIST.map(t => {
        const v = tenorData[t]?.today;
        return `<td class="${tdCls}">${v !== null && v !== undefined ? v.toFixed(4) : na}</td>`;
    }).join('');

    const prevCells = TENORS_LIST.map(t => {
        const v = tenorData[t]?.prev;
        return `<td class="${tdCls}">${v !== null && v !== undefined ? v.toFixed(4) : na}</td>`;
    }).join('');

    const sourceCells = TENORS_LIST.map(t => {
        const td = tenorData[t];
        const ts = shortSource(td?.today_source);
        const ps = shortSource(td?.prev_source);
        const pdu = td?.prev_date_used;
        const dateSuffix = (pdu && pdu !== prevDate) ? ` (${pdu})` : '';
        if(ts === '—' && ps === '—') return `<td class="px-4 py-3 text-center text-xs text-gray-400 dark:text-slate-500">${na}</td>`;
        return `<td class="px-4 py-3 text-center text-xs text-gray-500 dark:text-slate-400 leading-tight">${ts}<br><span class="text-gray-400 dark:text-slate-500">${ps}${dateSuffix}</span></td>`;
    }).join('');

    document.getElementById('cod-container').innerHTML = `
<div class="px-4 pt-3 pb-4">
  <h2 class="text-base font-semibold text-gray-700 dark:text-slate-200 mb-3">
    Live Change on Day &mdash; ${countryLabel(codData.country)}
  </h2>
  <div class="overflow-x-auto">
    <table class="w-full text-sm border-collapse">
      <tbody class="divide-y divide-gray-100 dark:divide-navy-700">
        <tr class="bg-gray-50 dark:bg-navy-900">
          <td class="${tdLabelCls} text-gray-500 dark:text-slate-400 text-xs uppercase tracking-wider">Tenor</td>
          ${tenorCells}
        </tr>
        <tr>
          <td class="${tdLabelCls}">CoD (bps)</td>
          ${codCells}
        </tr>
        <tr class="bg-gray-50 dark:bg-navy-900/50">
          <td class="${tdLabelCls}">${today}</td>
          ${todayCells}
        </tr>
        <tr>
          <td class="${tdLabelCls} text-gray-500 dark:text-slate-400">${prevDate}</td>
          ${prevCells}
        </tr>
        <tr class="bg-gray-50 dark:bg-navy-900/50">
          <td class="${tdLabelCls} text-gray-500 dark:text-slate-400">Source</td>
          ${sourceCells}
        </tr>
      </tbody>
    </table>
  </div>
</div>`;
}

// ── Error helpers ─────────────────────────────────────────────────
function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.classList.remove('hidden');
}
function clearError() {
    document.getElementById('error-msg').classList.add('hidden');
}

// ── Plotly theme ──────────────────────────────────────────────────
function plotlyTheme() {
    const dark = isDark();
    return {
        plot_bgcolor:  dark ? '#112240' : '#ffffff',
        paper_bgcolor: dark ? '#112240' : '#ffffff',
        font:      { color: dark ? '#cbd5e1' : '#374151' },
        gridcolor: dark ? '#1a3358' : '#e5e7eb',
        linecolor: dark ? '#1e3a5f' : '#d1d5db',
    };
}

// ── Chart ─────────────────────────────────────────────────────────
function updateChart(data, mode, selectedCountries) {

    const selectedTenors = getSelectedTenors();
    const t = plotlyTheme();

    const layout = {
        plot_bgcolor: t.plot_bgcolor,
        paper_bgcolor: t.paper_bgcolor,
        font: t.font,
        margin: { t:20, r:20, b:50, l:55 },
        showlegend: true,
        legend: { bgcolor: 'rgba(0,0,0,0)', font: { color: t.font.color } },
        xaxis: { gridcolor: t.gridcolor, linecolor: t.linecolor, zerolinecolor: t.gridcolor },
        yaxis: { title: 'Yield (%)', gridcolor: t.gridcolor, linecolor: t.linecolor, zerolinecolor: t.gridcolor },
    };

    const traces = [];
    const multiCountry = selectedCountries.length > 1;

    if(mode === 'country'){

        layout.xaxis.title = 'Tenor';
        layout.xaxis.categoryorder = 'array';
        layout.xaxis.categoryarray = ["1M","3M","6M","1Y","2Y","5Y","10Y","30Y"];

        data.forEach(row => {

            const vt = selectedTenors.filter(tn => row[tn] !== null);

            if(!vt.length) return;

            const label = multiCountry
                ? `${countryLabel(row.country)} ${row.date}`
                : row.date;

            traces.push({
                x: vt,
                y: vt.map(tn => row[tn]),
                type:'scatter',
                mode:'lines+markers',
                name: label
            });

        });

    }

    else {

        layout.xaxis.title = 'Date';

        if(mode === 'spread'){
            layout.yaxis.title = 'Spread (bps)';
        }

        data.forEach(c => {

            const dates = Object.keys(c.data).sort();

            if(mode === 'spread'){

                const spread = getSpreadTenors();
                if(!spread) return;

                const small = spread.small;
                const large = spread.large;

                const y = dates.map(d => {

                    const s = c.data[d][small]?.value
                    const l = c.data[d][large]?.value

                    const source = c.data[d][small]?.source || c.data[d][large]?.source

                    if(s == null || l == null) return null;

                    return (l - s) * 100;

                });

                const label = `${countryLabel(c.country)} ${large}-${small}`;

                traces.push({
                    x: dates,
                    y,
                    type:'scatter',
                    mode:'lines+markers',
                    name: label,
                    connectgaps:true
                });

            }

            else{

                selectedTenors.forEach(tn => {

                    const y = dates.map(d =>
                        c.data[d][tn]?.value ?? null
                    );

                    const label = multiCountry
                        ? `${countryLabel(c.country)} ${tn}`
                        : tn;

                    traces.push({
                        x: dates,
                        y,
                        type:'scatter',
                        mode:'lines+markers',
                        name: label,
                        connectgaps:true
                    });

                });

            }

        });

    }

    Plotly.newPlot(chartDiv, traces, layout, {
        responsive:true,
        displayModeBar:false
    });

}

// ── Table ─────────────────────────────────────────────────────────
const TABLE_ROW_LIMIT = 500;

function updateTable(data, mode) {
    const selectedTenors = getSelectedTenors();
    const td  = 'px-5 py-2.5 text-gray-700 dark:text-slate-300';
    const tdr = 'px-5 py-2.5 text-right font-mono text-gray-900 dark:text-slate-100';
    const mkrow = (date, country, tenor, val, source) => {
        const stale = source && source.includes('Last Received');
        const srcClass = stale
            ? 'px-5 py-2.5 font-medium text-amber-500 dark:text-amber-400'
            : td;
        return `<tr>
    <td class="${td}">${date}</td>
    <td class="${td}">${country}</td>
    <td class="${td}">${tenor}</td>
    <td class="${tdr}">${val != null ? val : '-'}</td>
    <td class="${srcClass}">${source || '-'}</td>
  </tr>`;
    };

    const rows = [];
    if(mode === 'country'){
        data.forEach(c => selectedTenors.forEach(t => {
            rows.push(mkrow(c.date || todayStr(), countryLabel(c.country), t, c[t], c[`${t}_source`]));
        }));
    } else {

    data.forEach(c => {

        const dates = Object.keys(c.data).sort()

        if(mode === 'spread'){

            const selected = getSelectedTenors()

            if(selected.length !== 2) return

            const small = selected[0]
            const large = selected[1]

            dates.forEach(d => {

                const s = c.data[d][small]?.value;
                const l = c.data[d][large]?.value;

                const source = c.data[d][small]?.source ||c.data[d][large]?.source || null;

                const spread =
                    (s != null && l != null)
                    ? ((l - s) * 100).toFixed(2)
                    : null

                  rows.push(
                      mkrow(d, countryLabel(c.country), `${large}-${small}`, spread, source)
                  )

            })

        }

        else{

            dates.forEach(d => {

                selectedTenors.forEach(t => {

                    rows.push(
                        mkrow(
                          d,
                          countryLabel(c.country),
                          t,
                          c.data[d][t]?.value,
                          c.data[d][t]?.source
                        )
                    )

                })

            })

        }

    })

}

    const truncated = rows.length > TABLE_ROW_LIMIT;
    const visible = truncated ? rows.slice(0, TABLE_ROW_LIMIT) : rows;
    tableBody.innerHTML = visible.join('');

    const note = document.getElementById('table-note');
    if(truncated){
        note.textContent = `Showing first ${TABLE_ROW_LIMIT} of ${rows.length} rows.`;
        note.classList.remove('hidden');
    } else {
        note.classList.add('hidden');
    }
}

// ── Event listeners ───────────────────────────────────────────────
modeSelect.addEventListener('change', fetchData);
startDateInput.addEventListener('change', fetchData);
endDateInput.addEventListener('change', fetchData);
tenorCheckboxes.forEach(cb => {
  cb.addEventListener('change', () => {

    if(modeSelect.value === 'spread'){

        const selected = getSelectedTenors()

        if(selected.length > 2){
            cb.checked = false
            return
        }

    }

    fetchData()

  })
})

document.getElementById('toggle-theme').addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    if(lastChart) updateChart(lastChart.data, lastChart.mode, lastChart.selectedCountries);
});

fetchData();
